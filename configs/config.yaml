project:
  name: ddi_cot_distillation_v2
  seed: 42
  output_dir: outputs

data:
  raw_path: data/raw/drugbank.tab
  name_map_path: data/raw/drugbank_name_map.json
  processed_dir: data/processed
  train_ratio: 0.8
  max_smiles_length: 512

teacher:
  model_name: meta-llama/Llama-3.3-70B-Instruct
  tensor_parallel_size: 4
  dtype: float16
  max_model_len: 8192
  max_new_tokens: 1024
  temperature: 0.6
  top_p: 0.95
  n_shot: 9
  batch_size: 64
  gpu_memory_utilization: 0.92
  save_every_n_batches: 50

judge:
  models:
    - model_name: Qwen/Qwen2.5-72B-Instruct
      tensor_parallel_size: 4
      dtype: float16
      max_model_len: 4096
      gpu_memory_utilization: 0.90
    - model_name: deepseek-ai/DeepSeek-R1-Distill-Qwen-32B
      tensor_parallel_size: 2
      dtype: float16
      max_model_len: 4096
      gpu_memory_utilization: 0.90
      no_system_prompt: true
      temperature: 0.6
    - model_name: mistralai/Mistral-Large-Instruct-2407
      tensor_parallel_size: 4
      dtype: float16
      max_model_len: 4096
      gpu_memory_utilization: 0.88
  min_overall_score: 3
  consensus_strategy: majority

student:
  model_name: Qwen/Qwen2.5-7B-Instruct
  dtype: bfloat16
  max_length: 2560
  lora:
    r: 64
    alpha: 128
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
  training:
    num_epochs: 3
    per_device_batch_size: 4
    gradient_accumulation_steps: 4
    learning_rate: 2.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.03
    lr_scheduler_type: cosine
    bf16: true
    gradient_checkpointing: true
    logging_steps: 50
    save_steps: 2000
    eval_steps: 2000
    # V2 additions
    sequential_lr_ratio: 0.25
    sequential_epochs: 2
    mix_ratio: 0.5
    sampling_temperature: 0.5

baseline_ml:
  fingerprint_bits: 2048
  fingerprint_radius: 2
  n_estimators: 500
  max_depth: 30
  n_jobs: -1

evaluation:
  batch_size: 64
  max_new_tokens: 1536
  n_manual_review: 50
  bertscore_model: microsoft/deberta-xlarge-mnli
  ece_n_bins: 15
  prompt_variants: 3
